# yaml-language-server: $schema=https://raw.githubusercontent.com/stubbedev/xilo/master/schemas/xilo.schema.json
# Example xilo config. Copy to xilo.yaml and edit. All fields are optional;
# shown values are the defaults. Secrets can also come from env
# (XILO_ADMIN_PASSWORD, XILO_S3_ACCESS_KEY, XILO_S3_SECRET_KEY), and the whole
# S3 block from XILO_S3_ENDPOINT / XILO_S3_BUCKET / XILO_S3_REGION /
# XILO_S3_INSECURE — setting XILO_S3_BUCKET selects the s3 backend, so a
# Docker deployment needs no config file at all.

listen: ":8080"
base_url: "http://localhost:8080" # use https://… in production so session cookies are Secure
data_dir: "./data"

admin:
  # Bootstraps the admin account on first run (bcrypt-hashed into the DB).
  # Set via XILO_ADMIN_PASSWORD in production. After the first run you can change
  # it and enable TOTP 2FA from the dashboard Settings page; this value is then
  # ignored (a stale env var can't reset the account).
  password: ""

# Metadata database. Empty = zero-config SQLite in data_dir; point at
# PostgreSQL (or set XILO_DATABASE_URL) to run at larger scale.
database:
  url: "" # e.g. "postgres://xilo:secret@db.internal/xilo"

# Multi-tenant mode: unlocks self-registration, plans and user-created
# organizations (all governed from the dashboard Settings). Off = private
# single-admin instance with no signup surface at all.
multi_tenant: false

# Outbound transactional email (registration, approval, org-membership
# notices). Empty host = mail disabled; everything still works, users just
# get no emails. Any SMTP relay works — Brevo shown:
# smtp:
#   host: "smtp-relay.brevo.com"
#   port: 587
#   username: "your-brevo-login"
#   password: "" # or XILO_SMTP_PASSWORD
#   from: "Xilo <cache@example.com>" # a verified sender on your relay

storage:
  backend: local # local | s3
  local:
    root: "" # defaults to <data_dir>/storage
  # s3: # any S3-compatible store (AWS, Garage, Cloudflare R2, …)
  #   endpoint: "localhost:3900" # Garage default; "s3.amazonaws.com" for AWS
  #   bucket: "xilo"
  #   region: "garage" # "us-east-1" for AWS
  #   access_key: "" # or XILO_S3_ACCESS_KEY
  #   secret_key: "" # or XILO_S3_SECRET_KEY
  #   insecure: false # true for a local Garage over plain HTTP

# Additional named blob backends next to the primary (named "default").
# Each cache is pinned to one backend at creation; dedup is per-backend.
# storages:
#   fast:
#     backend: local
#     local: { root: /nvme/xilo }
# default_storage: fast # backend for new caches when none is chosen

# Content-defined chunking (server-dictated; clients fetch these so dedup is
# consistent). Smaller average = better dedup, more overhead.
chunking:
  min_size: 65536
  avg_size: 262144
  max_size: 1048576
  nar_threshold: 65536 # NARs smaller than this are stored whole (skip chunking)

# At-rest chunk compression (zstd). fastest | default | better | best.
compression:
  level: default

# Advertised parallel uploads (0 = number of CPUs). Clients use this unless
# they pass --jobs.
parallelism: 0

# Skip pushing paths already signed by these upstream keys (don't re-cache nixpkgs).
upstream_keys: []
# upstream_keys: ["cache.nixos.org-1"]

# Background garbage collection.
gc:
  interval: "" # e.g. "12h"; empty disables the background sweeper
  retention: "" # e.g. "720h"; evict paths not pulled in this window (per-cache overrides)
  grace: "1h" # never sweep chunks newer than this (must exceed your longest push)

security:
  skip_upload_verify: false # false = verify reassembly == NarHash on push (proof of possession)
  allow_open_bootstrap: false # false = push always needs a token; true = open until first token

# Server-wide storage cap. When total stored (compressed) size exceeds this,
# least-recently-pulled paths are evicted on the GC tick until back under.
# Per-cache caps are set per cache in the dashboard. Empty/"0" = unlimited.
limits:
  total: "" # e.g. "500GB", "2TB"

# Request logging: full (every request) | quiet (errors + >1s requests only —
# the synchronous log write is measurable at very high request rates).
logging: full
