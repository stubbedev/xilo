name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  binaries:
    name: build ${{ matrix.goos }}/${{ matrix.goarch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - { goos: linux, goarch: amd64 }
          - { goos: linux, goarch: arm64 }
          - { goos: darwin, goarch: amd64 }
          - { goos: darwin, goarch: arm64 }
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "0"
        run: |
          # templ must run as a host binary regardless of the target platform;
          # its version comes from go.mod so it can't drift.
          GOOS= GOARCH= go run github.com/a-h/templ/cmd/templ@$(go list -m -f '{{.Version}}' github.com/a-h/templ) generate
          # Asset names carry no version (the release tag does) so the stable
          # URL releases/latest/download/xilo-<os>-<arch>.tar.gz always works —
          # the GitHub Action and install docs rely on it.
          out="xilo-${GOOS}-${GOARCH}"
          go build -trimpath -ldflags="-s -w -X main.version=${GITHUB_REF_NAME}" -o xilo ./cmd/xilo
          tar -czf "${out}.tar.gz" xilo
          sha256sum "${out}.tar.gz" > "${out}.tar.gz.sha256"
      - uses: actions/upload-artifact@v7
        with:
          name: xilo-${{ matrix.goos }}-${{ matrix.goarch }}
          path: xilo-*.tar.gz*

  release:
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: dist
      - uses: softprops/action-gh-release@v3
        with:
          files: dist/*
          generate_release_notes: true
