name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      # *_templ.go is not committed — generate it (templ version from go.mod).
      - name: generate templ views
        run: go run github.com/a-h/templ/cmd/templ@$(go list -m -f '{{.Version}}' github.com/a-h/templ) generate
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "unformatted:"; echo "$out"; exit 1; fi
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race ./...

  e2e:
    name: CLI end-to-end (real nix + containerized server)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: DeterminateSystems/nix-installer-action@main
      - name: generate templ views
        run: go run github.com/a-h/templ/cmd/templ@$(go list -m -f '{{.Version}}' github.com/a-h/templ) generate
      - name: run CLI e2e suite
        run: ./tests/e2e/cli.sh

  ops:
    name: k6 operations conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: run ops suite
        run: docker compose -f tests/k6/compose.yaml run --rm k6 run /scripts/ops.js
      - name: teardown
        if: always()
        run: docker compose -f tests/k6/compose.yaml down -v

  schema:
    name: JSON schema in sync
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # Regenerate schemas/xilo.schema.json from the config.Config Go types
      # so a new/changed field always flows into editor hinting.
      - name: regenerate schema
        run: |
          go run github.com/a-h/templ/cmd/templ@$(go list -m -f '{{.Version}}' github.com/a-h/templ) generate
          mkdir -p schemas
          go run ./cmd/xilo schema dump --out schemas/xilo.schema.json

      # On PRs: fail if stale so the author regenerates + commits.
      - name: assert in sync (PR)
        if: github.event_name == 'pull_request'
        run: |
          if [ -n "$(git status --porcelain schemas/xilo.schema.json)" ]; then
            echo "::error::JSON schema is stale. Run 'just sync-schema' and commit."
            git --no-pager diff schemas/xilo.schema.json
            exit 1
          fi

      # On master/main pushes: auto-commit any drift.
      - name: auto-commit (push)
        if: github.event_name == 'push'
        run: |
          if [ -z "$(git status --porcelain schemas/xilo.schema.json)" ]; then
            echo "schema already in sync"; exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add schemas/xilo.schema.json
          git commit -m 'chore: auto-bump JSON schema [skip ci]'
          git push
