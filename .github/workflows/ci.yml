name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  test:
    name: build + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      # Admin CSS is generated (not committed) and embedded via go:embed.
      - name: build admin CSS
        run: |
          curl -sSL https://github.com/tailwindlabs/tailwindcss/releases/download/v4.3.2/tailwindcss-linux-x64 -o /usr/local/bin/tailwindcss
          chmod +x /usr/local/bin/tailwindcss
          ./scripts/build-css.sh
      # *_templ.go is not committed — generate it (templ version from go.mod).
      - name: generate templ views
        run: go run github.com/a-h/templ/cmd/templ@$(go list -m -f '{{.Version}}' github.com/a-h/templ) generate
      - name: gofmt
        run: |
          out=$(gofmt -l .)
          if [ -n "$out" ]; then echo "unformatted:"; echo "$out"; exit 1; fi
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race ./...

  postgres:
    name: store suite against PostgreSQL
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: x
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: run store tests against postgres
        env:
          XILO_PG_TEST_DSN: postgres://postgres:x@localhost:5432/postgres
        run: go test ./internal/store/ -run TestPostgres -count=1 -v

  e2e:
    name: CLI end-to-end (real nix + containerized server)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: DeterminateSystems/nix-installer-action@main
      - name: build admin CSS
        run: |
          curl -sSL https://github.com/tailwindlabs/tailwindcss/releases/download/v4.3.2/tailwindcss-linux-x64 -o /usr/local/bin/tailwindcss
          chmod +x /usr/local/bin/tailwindcss
          ./scripts/build-css.sh
      - name: generate templ views
        run: go run github.com/a-h/templ/cmd/templ@$(go list -m -f '{{.Version}}' github.com/a-h/templ) generate
      - name: run CLI e2e suite
        run: ./tests/e2e/cli.sh

  ops:
    name: k6 operations conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: run ops suite (single-tenant)
        run: docker compose -f tests/k6/compose.yaml run --rm k6 run /scripts/ops.js
      - name: run deep suite (edge dimensions)
        run: docker compose -f tests/k6/compose.yaml run --rm k6 run /scripts/deep.js
      - name: run mt suite (multi-tenant conformance)
        run: |
          docker compose -f tests/k6/compose.yaml down -v
          XILO_E2E_CONFIG=server-mt.yaml docker compose -f tests/k6/compose.yaml \
            run --rm k6 run /scripts/mt.js
      - name: teardown
        if: always()
        run: docker compose -f tests/k6/compose.yaml down -v

  schema:
    name: schema + coverage badge in sync
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      # Regenerate schemas/xilo.schema.json from the config.Config Go types
      # so a new/changed field always flows into editor hinting.
      - name: build admin CSS
        run: |
          curl -sSL https://github.com/tailwindlabs/tailwindcss/releases/download/v4.3.2/tailwindcss-linux-x64 -o /usr/local/bin/tailwindcss
          chmod +x /usr/local/bin/tailwindcss
          ./scripts/build-css.sh
      - name: regenerate schema
        run: |
          go run github.com/a-h/templ/cmd/templ@$(go list -m -f '{{.Version}}' github.com/a-h/templ) generate
          mkdir -p schemas
          go run ./cmd/xilo schema dump --out schemas/xilo.schema.json

      # Coverage badge (shields.io endpoint JSON, served raw from master).
      # Generated *_templ.go views are excluded — the badge tracks the code
      # humans maintain.
      - name: regenerate coverage badge
        run: |
          go test -count=1 -coverprofile=cover.out ./internal/... > /dev/null
          grep -v "_templ.go:" cover.out > cover-filtered.out
          pct=$(go tool cover -func=cover-filtered.out | tail -1 | grep -oE '[0-9.]+%' | tr -d '%')
          color=orange
          awk -v p="$pct" 'BEGIN{exit !(p>=70)}' && color=yellowgreen
          awk -v p="$pct" 'BEGIN{exit !(p>=80)}' && color=green
          awk -v p="$pct" 'BEGIN{exit !(p>=90)}' && color=brightgreen
          mkdir -p .github/badges
          printf '{"schemaVersion":1,"label":"coverage","message":"%s%%","color":"%s"}\n' "$pct" "$color" > .github/badges/coverage.json
          rm cover.out cover-filtered.out
          cat .github/badges/coverage.json

      # On PRs: fail if the schema is stale so the author regenerates + commits.
      - name: assert in sync (PR)
        if: github.event_name == 'pull_request'
        run: |
          if [ -n "$(git status --porcelain schemas/xilo.schema.json)" ]; then
            echo "::error::JSON schema is stale. Run 'just sync-schema' and commit."
            git --no-pager diff schemas/xilo.schema.json
            exit 1
          fi

      # On master/main pushes: auto-commit any drift (schema + badge).
      - name: auto-commit (push)
        if: github.event_name == 'push'
        run: |
          if [ -z "$(git status --porcelain schemas/xilo.schema.json .github/badges/coverage.json)" ]; then
            echo "schema + badge already in sync"; exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add schemas/xilo.schema.json .github/badges/coverage.json
          git commit -m 'chore: auto-bump schema + coverage badge [skip ci]'
          git push
