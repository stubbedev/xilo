# Minimal xilo deployment with local filesystem storage.
#   docker compose up -d
#   docker compose exec xilo /xilo cache create mycache
# Then open http://localhost:8080/admin (password below).
services:
  xilo:
    image: ghcr.io/stubbedev/xilo:master
    ports:
      - "8080:8080"
    volumes:
      - xilo-data:/data
    environment:
      XILO_ADMIN_PASSWORD: change-me
      XILO_BASE_URL: http://localhost:8080
      # S3-compatible chunk storage instead of the volume (AWS, Garage, R2, …).
      # Setting XILO_S3_BUCKET selects the s3 backend — no config file needed.
      # The /data volume is still used for the SQLite database.
      # XILO_S3_BUCKET: xilo
      # XILO_S3_ENDPOINT: s3.amazonaws.com
      # XILO_S3_REGION: us-east-1
      # XILO_S3_ACCESS_KEY: ...
      # XILO_S3_SECRET_KEY: ...
    restart: unless-stopped

volumes:
  xilo-data:
